<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> i had to wait two months for you to forgive me :( thank you for forgiving me dumb!! im sorry if u ever got 
    hurt by my words . ❤️</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:0;
  background: linear-gradient(135deg, #ffe0f0, #c1e1ff);
  font-family: 'Poppins', Arial, sans-serif;
  text-align:center;
  overflow:hidden;
}

/* Container */
.container{
  max-width:90%;
  margin:60px auto;
  padding:30px;
  border:5px solid white;
  border-radius:25px;
  background: rgba(255,255,255,0.25);
  position: relative;
  z-index:10;
}

/* Title */
h1{
  font-size:40px;
  font-family: 'Pacifico', cursive;
  margin-bottom:25px;
  color:#444;
  position: relative;
  z-index:10;
}

/* Image */
img{
  width:220px;
  max-width:60vw;
  border-radius:15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  cursor:pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

img:hover{
  transform: scale(1.05);
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* Hint text */
#hint{
  font-size:16px;
  color:#333;
  margin-top:10px;
  font-weight:bold;
}

/* Sparkles */
.sparkle{
  position:absolute;
  font-size:15px;
  color:#FFD700;
  pointer-events:none;
  animation: sparkleAnim 2s linear infinite;
}

@keyframes sparkleAnim{
  0%{transform: translate(0,0) scale(1); opacity:1;}
  50%{transform: translate(5px,-5px) scale(1.2); opacity:0.7;}
  100%{transform: translate(0,0) scale(1); opacity:1;}
}

/* Responsive */
@media(max-width:500px){
  h1{ font-size:30px; }
  img{ width:160px; }
  #hint{ font-size:14px; }
}
</style>
</head>
<body>

<div class="container">
<h1>i had to wait two months for you to forgive me :( thank you for forgiving me dumb!! im sorry if u ever got 
    hurt by my words.</h1>

<img id="forgive-img" src="https://tse2.mm.bing.net/th/id/OIP.LnZqSptn_G-tWZpIadOtyQAAAA?pid=Api&h=220&P=0" alt="Forgiven Image">
<div id="hint">Now click on the image ✨</div>
</div>

<script>
/* Sparkles around the page */
function createSparkle(){
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.innerHTML="✨";
  sparkle.style.left=Math.random()*window.innerWidth+"px";
  sparkle.style.top=Math.random()*window.innerHeight+"px";
  document.body.appendChild(sparkle);
  setTimeout(()=>{ sparkle.remove(); },3000);
}
setInterval(createSparkle,500);

/* Click image to go to page 3 */
const img = document.getElementById("forgive-img");
img.addEventListener("click", ()=>{
  window.location.href="page3.html";
});
</script>

</body>
</html>
