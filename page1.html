<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgive Me</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Press+Start+2P&family=Poppins:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  padding:0;
  background: linear-gradient(135deg, #c1e1ff, #bfe9ff);
  font-family: 'Poppins', Arial, sans-serif;
  text-align:center;
  overflow:hidden;
  cursor:url("https://cur.cursors-4u.net/symbols/sym-1/sym46.cur"),auto;
  transition: transform 0.1s ease;
}

.container{
  border:5px solid white;
  padding:25px;
  display:inline-block;
  border-radius:25px;
  background:rgba(255,255,255,0.25);
  margin-top:50px;
  position: relative;
  z-index: 10;
  max-width: 90%;
  box-sizing: border-box;
}

/* Apology text */
h1{
  font-size:36px;
  color:#222;
  font-family: 'Pacifico', cursive;
  margin:0 0 30px 0;
  line-height:1.3;
  position: relative;
  z-index: 10;
}

/* Image */
img{
  width:150px;
  max-width:50vw;
  vertical-align:middle;
  margin-bottom:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
  position: relative;
  z-index: 10;
}

/* Buttons container */
.buttons{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
  position: relative;
  z-index: 10;
}

/* Buttons */
button{
  width:130px;
  height:55px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  background: linear-gradient(135deg, #74c0fc, #4dabf7);
  box-shadow:0 6px 12px rgba(0,0,0,0.2);
  transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
  font-family: 'Poppins', sans-serif;
  position: relative; /* no overlap */
}

button:hover{
  transform: scale(1.1);
  box-shadow:0 8px 16px rgba(0,0,0,0.3);
}

#yes::after{ content: " 💖"; }
#no::after{ content: " ❌"; }

/* Hearts */
.heart{
  position:absolute;
  font-size:25px;
  animation:float 3s linear forwards;
  pointer-events: none;
}

@keyframes float{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-300px); opacity:0;}
}

/* Sparkles */
.sparkle{
  position:absolute;
  font-size:15px;
  color: #FFD700;
  pointer-events: none;
  animation: sparkleAnim 2s linear infinite;
}

@keyframes sparkleAnim{
  0%{transform: translate(0,0) scale(1); opacity:1;}
  50%{transform: translate(5px,-5px) scale(1.2); opacity:0.7;}
  100%{transform: translate(0,0) scale(1); opacity:1;}
}

/* Batman flying */
.batsignal{
  position:absolute;
  top:10%;
  left:-150px;
  font-size:70px;
  animation:fly 10s linear infinite;
  opacity:0.8;
  z-index: 5;
}

@keyframes fly{
  0%{left:-200px;}
  100%{left:120%;}
}

/* Batman message */
#batman-message {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #FFD700;
  font-size: 25px;
  font-weight: bold;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  font-family: 'Press Start 2P', cursive;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
  z-index: 50;
}

/* Responsive */
@media(max-width: 500px){
  h1{ font-size:28px; }
  img{ width:120px; margin-bottom:15px; }
  button{ width:100px; height:45px; font-size:16px; }
  .batsignal{ font-size:50px; }
  #batman-message{ font-size:20px; padding:8px 15px; }
}
</style>
</head>

<body>

<!-- Background music -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7b7b4a7c07.mp3">
</audio>

<div class="batsignal">🦇</div>

<div class="container">

<h1>
  <img src="https://tse4.mm.bing.net/th/id/OIP._DbF2nfSq_nzqfn2_S8PSgHaHY?pid=Api&h=220&P=0" alt="Sorry Image">
  I'm sorry... will you forgive me?
</h1>

<div class="buttons">
  <button id="yes">YES</button>
  <button id="no">NO</button>
</div>

</div>

<div id="batman-message">You have no choice.</div>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const batmanMsg = document.getElementById("batman-message");
const body = document.body;
let shakeTimeout;
let isShaking = false;

/* Create floating sparkles randomly */
function createSparkle(){
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.innerHTML = "✨";
  sparkle.style.left = Math.random() * window.innerWidth + "px";
  sparkle.style.top = Math.random() * window.innerHeight + "px";
  document.body.appendChild(sparkle);
  setTimeout(()=>{ sparkle.remove(); }, 3000);
}
setInterval(createSparkle, 500);

/* NO button slightly moves when hovered */
no.addEventListener("mouseover", function(){
  let x = Math.random() * (window.innerWidth - no.offsetWidth);
  let y = Math.random() * (window.innerHeight - no.offsetHeight);
  no.style.position = "relative"; // relative keeps it inside flow
  no.style.left = x + "px";
  no.style.top = y + "px";

  // YES button grows
  yes.style.transform = "scale(1.5)";
  batmanMsg.style.opacity = "1";

  // Screen shake
  if(!isShaking){
    isShaking = true;
    let start = Date.now();
    function shake(){
      const elapsed = Date.now() - start;
      if(elapsed<500){
        const dx = (Math.random()-0.5)*8;
        const dy = (Math.random()-0.5)*8;
        body.style.transform = `translate(${dx}px, ${dy}px)`;
        requestAnimationFrame(shake);
      } else{
        body.style.transform="translate(0,0)";
        isShaking=false;
      }
    }
    shake();
  }

  clearTimeout(shakeTimeout);
  shakeTimeout=setTimeout(()=>{
    yes.style.transform="scale(1)";
    batmanMsg.style.opacity="0";
  },1500);
});

/* YES button click: hearts + go to page2.html immediately */
yes.addEventListener("click", function(){
  for(let i=0;i<50;i++){
    let heart=document.createElement("div");
    heart.innerHTML="💖";
    heart.className="heart";
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },3000);
  }
  // Go to page 2 immediately
  setTimeout(()=>{ window.location.href = "page2.html"; }, 500);
});
</script>

</body>
</html>
